{% extends 'certificates/base.html' %}

{% block title %}ログイン - AegisCert{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="card auth-card">
        <div class="auth-header">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent);">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <h1>AegisCert ログイン</h1>
            <p style="color: var(--text-secondary); margin-top: 8px;">自動証明書発行システムへログインします</p>
        </div>

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">ユーザー名</label>
                <input type="text" name="username" autofocus required id="id_username" class="form-control" placeholder="ユーザー名を入力してください">
            </div>
            
            <div class="form-group">
                <label for="id_password">パスワード</label>
                <input type="password" name="password" required id="id_password" class="form-control" placeholder="パスワードを入力してください">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">ログイン</button>
        </form>

        <div class="auth-footer">
            <p>アカウントをお持ちでないですか？ <a href="{% url 'register' %}">新規登録はこちら</a></p>
        </div>
    </div>
</div>
{% endblock %}
